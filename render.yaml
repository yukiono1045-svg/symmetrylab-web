services:
  - type: web
    name: symmetrylab
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server.app:app --host 0.0.0.0 --port $PORT
    disk:
      name: data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: BASE_URL
        sync: false
      - key: ADMIN_KEY
        sync: false
      - key: DB_PATH
        value: /var/data/bookings.db
      - key: TRAINING_DATES_PATH
        value: /var/data/training_dates.json
      - key: SMTP_EMAIL
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_HOST
        value: smtp.office365.com
      - key: SMTP_PORT
        value: "587"
      - key: ADMIN_EMAIL
        sync: false
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
