services:
  - type: web
    name: symmetrylab
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: BASE_URL
        sync: false
      - key: ADMIN_KEY
        sync: false
